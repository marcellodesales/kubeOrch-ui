version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    assignees:
      - "mohit-nagaraj"
    reviewers:
      - "mohit-nagaraj"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      - dependency-name: "eslint-config-next"
        versions: [">=16.0.0"]
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-version:
        applies-to: version-updates
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    assignees:
      - "mohit-nagaraj"
    reviewers:
      - "mohit-nagaraj"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
