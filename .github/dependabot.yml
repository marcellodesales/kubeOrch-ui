version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    assignees:
      - "mohit-nagaraj"
    reviewers:
      - "mohit-nagaraj"
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    assignees:
      - "mohit-nagaraj"
    reviewers:
      - "mohit-nagaraj"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
